<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60">
  <!-- Symbol: Taegeuk / Propeller approximation -->
  <g transform="translate(30, 30) scale(0.8)">
    <circle cx="0" cy="0" r="28" fill="#0065b3" />
    <path d="M-28,0 A28,28 0 0,1 28,0 A14,14 0 0,1 0,0 A14,14 0 0,0 -28,0 Z" fill="#c60c30" transform="rotate(-30)" />
    <circle cx="0" cy="0" r="28" fill="none" stroke="white" stroke-width="2" />
    <!-- White divider line for the propeller effect -->
    <path d="M-28,0 A28,28 0 0,1 28,0" fill="none" stroke="white" stroke-width="3" transform="rotate(-30)" />
  </g>
  
  <!-- Text: KOREAN AIR -->
  <text x="70" y="42" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="34" fill="#0065b3" letter-spacing="-1">KOREAN AIR</text>
